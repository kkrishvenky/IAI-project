{% extends "layout.html" %}

{% block page_title %}My Profile{% endblock %}
{% block page_subtitle %}Manage your account settings{% endblock %}

{% block content %}
<div class="test-config-card" style="max-width: 500px;">
    <h3>Account Details</h3>
    <form method="POST" action="{{ url_for('profile') }}">
        <div class="form-group">
            <label>Username</label>
            <input type="text" value="{{ user.username }}" class="form-control" disabled>
        </div>
        
        <div class="form-group">
            <label>Email Address</label>
            <input type="email" value="{{ user.email }}" class="form-control" disabled>
        </div>

        <div class="form-group">
            <label>Role</label>
            <input type="text" value="{{ user.role }}" class="form-control" disabled>
        </div>
        
        <hr style="border:0; border-top: 1px solid var(--border-color); margin: 24px 0;">
        
        <h3>Update Password</h3>
        <p style="color: var(--text-muted); font-size: 0.9rem; margin-bottom: 16px;">
            Enter a new password below to update your account access.
        </p>

        <div class="form-group">
            <label for="password">New Password</label>
            <input type="password" id="password" name="password" class="form-control" placeholder="••••••••" required minlength="6">
        </div>

        <button type="submit" class="btn btn-primary" style="width: 100%;">Save New Password</button>
    </form>
</div>
{% endblock %}
